<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Перенаправление...</title>
    <script>

      const path = window.location.pathname;
      const repoName = path.split('/')[1]; 
      window.location.replace('/' + repoName + '/?redirect=' + encodeURIComponent(path));
    </script>
  </head>
  <body></body>
</html>
